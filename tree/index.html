<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVG Viewer with Panzoom</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f0f0f0;
  }

  #viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none; /* allow pinch gestures */
    background: #ddd;
  }

  #svgWrapper {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  img {
    width: 100%;
    height: auto;
    max-width: none;
    max-height: none;
    user-select: none;
    pointer-events: none; /* Panzoom handles events */
  }
</style>
</head>
<body>

<div id="viewport">
  <div id="svgWrapper">
    <form id="login">
	<div>
	  <label for="pass">Password:</label>
	  <input type="text" id="pass" name="password" required />
	</div>
	<input type="submit" value="Decrypt" />
  </div>
</div>

<script src="./crypto.js"></script>
<script>
	const {encrypt, decrypt} = createCrypto();

	let pw = null;
	let svgEnc = null;
	fetch("./treeenc.svg").then(r => r.text()).then(t => { svgEnc = t; pw && loadSVG() });
	
	document.getElementById("login").addEventListener("submit", (e) => {
		e.preventDefault();
		console.log(e);
		pw = document.getElementById("pass").value;
		svgEnc && loadSVG();
	});
	
	async function loadSVG() {
		console.log(svgEnc.slice(0, 100));
		console.log(pw);
		const decrypted = await decrypt(svgEnc, pw);
		console.log(decrypted.slice(0, 100));
		if (decrypted.startsWith("<svg ")) {
			document.getElementById("svgWrapper").innerHTML = decrypted;
		}
	}
</script>

<!-- Panzoom library -->
<script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

<script>
  const elem = document.getElementById('svgWrapper');
  const panzoom = Panzoom(elem, {
    maxScale: 10,
    minScale: 1,
    contain: 'outside',
    cursor: 'grab'
  });

  // Enable wheel zoom
  document.getElementById('viewport').addEventListener('wheel', panzoom.zoomWithWheel);

  // Enable pinch zoom + pan automatically (Panzoom handles pointer events)
</script>

</body>
